<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Fly Easy Dream</title>
    <link rel="stylesheet" href="experience.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="index.html">
                    <img src="assets/logo.svg" alt="Fly Easy Dream" class="login-logo">
                </a>
                <h2>Bon retour parmi nous</h2>
                <p>Connectez-vous pour gérer vos réservations</p>
            </div>

            <form action="#" class="login-form">
                <div class="input-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" placeholder="exemple@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Se souvenir de moi
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div class="login-footer">
                <p>Pas encore de compte ? <a href="inscription.html">Inscrivez-vous</a></p>
            </div>
        </div>
    </div>

</body>
</html>
