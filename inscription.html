<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer un compte | Fly Easy Dream</title>
    <link rel="stylesheet" href="experience.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-body">
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <a href="index.html">
            <img
              src="assets/logo.svg"
              alt="Fly Easy Dream"
              class="login-logo"
            />
          </a>
          <h2>Rejoignez l'aventure</h2>
          <p>Créez votre compte et voyager plus facilement.</p>
        </div>

        <form action="#" class="login-form">
          <div class="input-group">
            <label for="fullname">Nom complet</label>
            <input
              type="text"
              id="fullname"
              placeholder="Ex: Jean Mukendi"
              required
            />
          </div>

          <div class="input-group">
            <label for="email">Adresse e-mail</label>
            <input
              type="email"
              id="email"
              placeholder="votre@email.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="phone">Numéro de téléphone</label>
            <input type="tel" id="phone" placeholder="+243 ..." required />
          </div>

          <div class="input-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              placeholder="Minimum 8 caractères"
              required
            />
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" required /> J'accepte les
              <a href="#" class="forgot-password">Conditions Générales</a>
            </label>
          </div>

          <button type="submit" class="btn-login">Créer mon compte</button>
        </form>

        <div class="login-footer">
          <p>Déjà membre ? <a href="login.html">Connectez-vous</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
